spring:
  application:
    name: hris-backend

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5433/hris_db}
    username: ${DATASOURCE_USER:hris_user}
    password: ${DATASOURCE_PASS:hris_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:hris_user}
    password: ${RABBITMQ_PASS:hris_pass}
    virtual-host: ${RABBITMQ_VHOST:hris_vhost}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms
          multiplier: 2.0
          max-interval: 10000ms

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/hris/protocol/openid-connect/certs}
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/hris}

  messages:
    basename: i18n/messages
    encoding: UTF-8
    cache-duration: 3600s

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  transaction:
    default-timeout: 30

app:
  storage:
    attachments-root: ${APP_STORAGE_ATTACHMENTS_ROOT:./storage/attachments}
    exports-root: ${APP_STORAGE_EXPORTS_ROOT:./storage/exports}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,db,rabbit,storage
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    db:
      enabled: true
    rabbitmq:
      enabled: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

server:
  port: 8080

logging:
  level:
    com.hris: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO
    org.springframework.retry: DEBUG
