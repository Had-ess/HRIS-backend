spring:
  application:
    name: hris-backend

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5433/hris_db}
    username: ${DATASOURCE_USER:hris_user}
    password: ${DATASOURCE_PASS:hris_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:hris_user}
    password: ${RABBITMQ_PASS:hris_pass}
    virtual-host: ${RABBITMQ_VHOST:hris_vhost}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms
          multiplier: 2.0
          max-interval: 10000ms

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/hris/protocol/openid-connect/certs}
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/hris}

  messages:
    basename: i18n/messages
    encoding: UTF-8
    cache-duration: 3600s

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  transaction:
    default-timeout: 30

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}

app:
  storage:
    attachments-root: ${APP_STORAGE_ATTACHMENTS_ROOT:./storage/attachments}
    exports-root: ${APP_STORAGE_EXPORTS_ROOT:./storage/exports}
  onboarding:
    login-url: ${APP_ONBOARDING_LOGIN_URL:http://localhost:4200}
  mail:
    from: ${APP_MAIL_FROM:no-reply@hris.local}
  leave:
    accrual:
      enabled: ${APP_LEAVE_ACCRUAL_ENABLED:false}
      cron: ${APP_LEAVE_ACCRUAL_CRON:0 0 5 * * *}
  admin:
    sla-check:
      enabled: ${APP_ADMIN_SLA_CHECK_ENABLED:false}
      cron: ${APP_ADMIN_SLA_CHECK_CRON:0 0 */4 * * *}

keycloak:
  admin:
    server-url: ${KEYCLOAK_ADMIN_SERVER_URL:http://localhost:8180}
    realm: ${KEYCLOAK_ADMIN_REALM:hris}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:hris-backend}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:hris-backend-secret}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,db,rabbit,storage
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    db:
      enabled: true
    rabbitmq:
      enabled: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

server:
  port: 8081

logging:
  level:
    com.hris: ${LOG_LEVEL_APP:INFO}
    com.hris.notification: DEBUG
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE_SQL:WARN}
    org.springframework.security: ${LOG_LEVEL_SPRING_SECURITY:INFO}
    org.springframework.retry: ${LOG_LEVEL_SPRING_RETRY:INFO}
    org.springframework.amqp: DEBUG
